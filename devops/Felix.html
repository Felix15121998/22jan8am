<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample 1000+ Line HTML</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header, footer { background: #333; color: #fff; padding: 20px; text-align: center; }
        nav { background: #555; color: #fff; padding: 10px; }
        nav a { color: #fff; margin: 0 10px; text-decoration: none; }
        .content { padding: 20px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>
    <header>
        <h1>My Sample Website</h1>
        <p>Demonstration of a large HTML file</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Repeated content blocks to exceed 1000 lines -->
    <main>
        <!-- Block 1 -->
        <div class="content">
            <h2>Section 1</h2>
            <p>This is a sample paragraph for section 1.</p>
        </div>

        <!-- Block 2 -->
        <div class="content">
            <h2>Section 2</h2>
            <p>This is a sample paragraph for section 2.</p>
        </div>

        <!-- Repeat blocks -->
